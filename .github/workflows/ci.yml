name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: swift --version

      # Unit tests for all ShorkutCore logic (terminal launch, managed-script
      # deletion, safe imports, import validation, persistence/migration,
      # update checking, restart decision).
      - name: Run tests
        run: swift test

      # Production type-check/build of the full app target (SwiftUI/AppKit)
      # under SPM — catches anything the flat build.sh compile would.
      - name: Build app (release)
        run: swift build -c release

      # Shell validation of the build script.
      - name: Shell syntax check
        run: bash -n build.sh

      - name: ShellCheck
        run: |
          brew list shellcheck >/dev/null 2>&1 || brew install shellcheck
          # Fail on genuine errors; style warnings (e.g. intentional glob
          # word-splitting in swiftc invocations) don't break the build.
          shellcheck -S error build.sh
